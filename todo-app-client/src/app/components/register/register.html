<div class="auth-container">
  <h2>Реєстрація</h2>
  
  <div *ngIf="errorMessage" class="server-error">
    {{ errorMessage }}
  </div>

  <div *ngIf="successMessage" class="server-error" style="background-color: #e6f4ea; color: #137333;">
    {{ successMessage }}
  </div>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
    <label>Ім'я</label>
    <input type="text" formControlName="firstName">
    <span *ngIf="registerForm.get('firstName')?.invalid && registerForm.get('firstName')?.touched" class="error-text">
      Введіть ім'я (мін. 2 символи)
    </span>
  </div>

  <div class="form-group">
    <label>Прізвище</label>
    <input type="text" formControlName="lastName">
    <span *ngIf="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched" class="error-text">
      Введіть прізвище (мін. 2 символи)
    </span>
  </div>
    <div class="form-group">
      <label>Електронна пошта</label>
      <input 
        type="email" 
        formControlName="email"
        [ngClass]="{'invalid': registerForm.get('email')?.invalid && registerForm.get('email')?.touched}">
      <span *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="error-text">
        Введіть коректний email.
      </span>
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input 
        type="password" 
        formControlName="password"
        [ngClass]="{'invalid': registerForm.get('password')?.invalid && registerForm.get('password')?.touched}">
      <span *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="error-text">
        Пароль має містити мінімум 5 символів.
      </span>
    </div>

    <button type="submit" [disabled]="registerForm.invalid">Створити акаунт</button>
  </form>

  <div class="auth-redirect">
    Вже маєте акаунт? <a routerLink="/login">Увійти</a>
  </div>
</div>
