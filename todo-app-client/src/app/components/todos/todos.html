 <div class="todo-page-header">
  <h2>Мої завдання</h2>
  <button class="add-task-btn" (click)="openModal()">
    <i class="bi bi-plus-lg"></i> Нове завдання
  </button>
</div>

<p *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</p>
<p *ngIf="todos.length === 0" class="empty-msg">Список завдань порожній. Час відпочити! ☕</p>

<div class="todo-list">
  <!-- <div *ngFor="let todo of todos" class="todo-item" [ngClass]="{'completed': todo.isCompleted, 'important': todo.isImportant}"> -->
    <div *ngFor="let todo of todos" class="todo-item" [ngClass]="{'completed': todo.isCompleted, 'important': todo.isImportant}">
    <div class="todo-left">
      <input type="checkbox" [checked]="todo.isCompleted" (change)="toggleComplete(todo)">
      <div class="todo-text">
        <span class="todo-title">{{ todo.title }}</span>
        <p *ngIf="todo.description" class="todo-desc">{{ todo.description }}</p>
        <span *ngIf="todo.dueDate" class="todo-date">📅 До: {{ todo.dueDate | date:'dd.MM.yyyy' }}</span>
      </div>
    </div>
    <div class="todo-right">
      <button (click)="toggleImportant(todo)" class="action-btn important-btn">
        <i class="bi" [ngClass]="todo.isImportant ? 'bi-star-fill' : 'bi-star'"></i>
      </button>
      <button class="action-btn delete-btn" (click)="deleteTodo(todo.id)">
        <i class="bi bi-trash3"></i>
      </button>
    </div>
  </div>
</div>

<div class="modal-overlay" *ngIf="isModalOpen" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Створити нове завдання</h3>
      <button class="close-modal-btn" (click)="closeModal()"><i class="bi bi-x-lg"></i></button>
    </div>

    <form [formGroup]="todoForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <input type="text" formControlName="title" placeholder="Назва завдання *">
      </div>

      <div class="form-group">
        <textarea formControlName="description" placeholder="Опис завдання (необов'язково)"></textarea>
      </div>

      <div class="form-group">
        <input type="date" formControlName="dueDate">
      </div>

      <div class="form-group">
       <select formControlName="categoryId">
  <option [value]="''">Оберіть категорію</option> 
  <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
</select>
      </div>

      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" formControlName="isImportant"> ⭐ Позначити як важливе
        </label>
      </div>

      <button type="submit" [disabled]="todoForm.invalid" class="submit-btn">Додати</button>
    </form>
  </div>
</div>
