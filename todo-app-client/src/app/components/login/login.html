<div class="login-page">
<div class="auth-container">
  <h2>Вхід</h2>
  
  <div *ngIf="errorMessage" class="server-error">
    {{ errorMessage }}
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Електронна пошта</label>
      <input 
        type="email" 
        formControlName="email"
        [ngClass]="{'invalid': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}">
      <span *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error-text">
        Введіть коректний email.
      </span>
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input 
        type="password" 
        formControlName="password"
        [ngClass]="{'invalid': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}">
      <span *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-text">
        Пароль має містити мінімум 5 символів.
      </span>
    </div>

    <button type="submit" [disabled]="loginForm.invalid">Увійти</button>
  </form>

  <div class="auth-redirect">
    Немає акаунту? <a routerLink="/register">Зареєструватися</a>
  </div>
</div>
</div>
